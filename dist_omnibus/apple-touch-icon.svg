<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e2a"/>
      <stop offset="100%" style="stop-color:#0d1f1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60fcc6"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)" />
  <!-- Bars -->
  <rect x="34" y="105" width="28" height="25" rx="4" fill="url(#accent)" opacity="0.5"/>
  <rect x="70"  y="84"  width="28" height="46" rx="4" fill="url(#accent)" opacity="0.75"/>
  <rect x="106" y="66"  width="28" height="64" rx="4" fill="url(#accent)" opacity="1"/>
  <!-- Trend line -->
  <polyline points="48,105 84,84 120,63"
    fill="none" stroke="#60fcc6" stroke-width="3"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="48"  cy="105" r="3.5" fill="#1a2e2a" stroke="#60fcc6" stroke-width="2"/>
  <circle cx="84"  cy="84"  r="3.5" fill="#1a2e2a" stroke="#60fcc6" stroke-width="2"/>
  <circle cx="120" cy="63"  r="5"   fill="#60fcc6"/>
  <!-- Baseline -->
  <line x1="28" y1="134" x2="152" y2="134" stroke="#60fcc6" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- K badge -->
  <rect x="26" y="22" width="38" height="38" rx="9" fill="#60fcc6"/>
  <text x="45" y="52" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="28" fill="#005e44">K</text>
</svg>
