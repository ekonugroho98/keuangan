<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60fcc6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chart" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#60fcc6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#60fcc6;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)" />

  <!-- Subtle inner glow ring -->
  <rect width="512" height="512" rx="110" ry="110"
        fill="none" stroke="#60fcc6" stroke-width="2" opacity="0.15" />

  <!-- Bar chart area fill -->
  <polygon points="100,370 100,300 180,300 180,370" fill="url(#chart)" />
  <polygon points="200,370 200,240 280,240 280,370" fill="url(#chart)" />
  <polygon points="300,370 300,190 380,190 380,370" fill="url(#chart)" />
  <polygon points="400,370 400,260 412,260 412,370" fill="url(#chart)" opacity="0" />

  <!-- Bar chart bars -->
  <rect x="100" y="300" width="80" height="70" rx="10" fill="url(#accent)" opacity="0.5" />
  <rect x="200" y="240" width="80" height="130" rx="10" fill="url(#accent)" opacity="0.75" />
  <rect x="300" y="190" width="80" height="180" rx="10" fill="url(#accent)" opacity="1" />

  <!-- Trend line over bars -->
  <polyline points="140,300 240,240 340,185"
    fill="none" stroke="#60fcc6" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.9" />

  <!-- Dots on trend line -->
  <circle cx="140" cy="300" r="9" fill="#1a2e2a" stroke="#60fcc6" stroke-width="5" />
  <circle cx="240" cy="240" r="9" fill="#1a2e2a" stroke="#60fcc6" stroke-width="5" />
  <circle cx="340" cy="185" r="12" fill="#60fcc6" />

  <!-- Base line -->
  <line x1="84" y1="378" x2="428" y2="378"
        stroke="#60fcc6" stroke-width="4" stroke-linecap="round" opacity="0.35" />

  <!-- K letter — top-left badge -->
  <rect x="72" y="68" width="108" height="108" rx="24" fill="#60fcc6" />
  <text x="126" y="154" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="80" fill="#005e44"
        letter-spacing="-2">K</text>
</svg>
