<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e2a"/>
      <stop offset="100%" style="stop-color:#0d1f1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60fcc6"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="chart" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#60fcc6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#60fcc6;stop-opacity:0.55"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#bg)" />
  <rect width="192" height="192" rx="42" fill="none" stroke="#60fcc6" stroke-width="1" opacity="0.15"/>
  <!-- Bars -->
  <rect x="37" y="112" width="30" height="26" rx="4" fill="url(#accent)" opacity="0.5"/>
  <rect x="75" y="90"  width="30" height="48" rx="4" fill="url(#accent)" opacity="0.75"/>
  <rect x="113" y="71" width="30" height="67" rx="4" fill="url(#accent)" opacity="1"/>
  <!-- Trend line -->
  <polyline points="52,112 90,90 128,68"
    fill="none" stroke="#60fcc6" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="52"  cy="112" r="4" fill="#1a2e2a" stroke="#60fcc6" stroke-width="2.5"/>
  <circle cx="90"  cy="90"  r="4" fill="#1a2e2a" stroke="#60fcc6" stroke-width="2.5"/>
  <circle cx="128" cy="68"  r="5.5" fill="#60fcc6"/>
  <!-- Baseline -->
  <line x1="30" y1="142" x2="162" y2="142" stroke="#60fcc6" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- K badge -->
  <rect x="27" y="24" width="40" height="40" rx="9" fill="#60fcc6"/>
  <text x="47" y="56" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="30" fill="#005e44">K</text>
</svg>
